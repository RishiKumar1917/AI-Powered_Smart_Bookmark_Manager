<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bookmarks HQ</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b; /* Deep space dark */
            --surface-color: rgba(20, 20, 25, 0.6); /* Very dark semi-transparent */
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent: #ff7eb3;
            --accent-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --text-gradient: linear-gradient(to right, #f8a5c2, #a78bfa, #8b5cf6); /* Pink to purple to blue */
        }

        body {
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Subtle radial glow in the center-top */
            background-image: radial-gradient(circle at 50% -20%, rgba(124, 58, 237, 0.15) 0%, rgba(9, 9, 11, 1) 70%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        h1, h2, #userGreeting {
            font-weight: 800;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        h1 {
            text-align: center;
            font-size: 3.5rem;
            margin-bottom: 40px;
        }
        
        h2 { font-size: 2rem; }

        /* LOGIN SCREEN */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 50vh;
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            padding: 40px;
            text-align: center;
        }

        #loginScreen p { color: var(--text-secondary); margin-bottom: 30px; font-size: 1.1rem; }

        /* DASHBOARD */
        #dashboard { display: none; }
        
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        #userGreeting { margin-bottom: 0; font-size: 1.7rem; }
        
        .logout-btn {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); border-color: rgba(255,255,255,0.2); }

        /* INPUT AREA */
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 16px 24px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }
        input:focus { 
            border-color: rgba(255,126,179,0.5); 
            box-shadow: 0 0 20px rgba(255,126,179,0.15);
            background: rgba(0, 0, 0, 0.5);
        }

        button.primary-btn {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.3);
        }
        button.primary-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(255, 117, 140, 0.4);
        }
        button.primary-btn:active { transform: scale(0.98); }

        /* SEARCH & FILTERS */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .filters::-webkit-scrollbar { height: 4px; }
        .filters::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .filter-btn {
            padding: 10px 24px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 500;
        }
        .filter-btn:hover { 
            border-color: rgba(255,255,255,0.3); 
            color: white;
        }
        .filter-btn.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.3);
        }

        /* BOOKMARK CARDS */
        .bookmark-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 24px;
            margin-bottom: 20px;
            border-radius: 20px;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
        }
        /* Subtle shine effect on hover */
        .bookmark-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.03), transparent);
            transform: skewX(-20deg);
            transition: all 0.7s;
        }
        .bookmark-card:hover::before {
            left: 150%;
        }

        .bookmark-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            border-color: rgba(255,255,255,0.1);
            background: rgba(255, 255, 255, 0.04);
        }

        .bookmark-content { flex: 1; min-width: 0; padding-right: 20px; }
        
        .tag {
            display: inline-block;
            background: rgba(255, 126, 179, 0.1);
            color: #ff7eb3;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 126, 179, 0.2);
        }
        
        .bookmark-title {
            display: block;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }
        .bookmark-title:hover { color: var(--accent); }

        .bookmark-url {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0 0 16px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.7;
        }

        .ai-summary {
            color: #e2e8f0;
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 12px 16px;
            border-radius: 12px;
            border-left: 2px solid rgba(255,126,179,0.5);
        }

        .card-actions { display: flex; flex-direction: column; gap: 10px; }
        .icon-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
        }
        .icon-btn:hover { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border-color: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        .icon-btn.delete:hover { 
            background: rgba(239, 68, 68, 0.15); 
            color: #fca5a5; 
            border-color: rgba(239, 68, 68, 0.3);
        }

        #loadingMsg { text-align: center; color: var(--accent); margin-bottom: 20px; display: none; font-weight: 600; letter-spacing: 1px;}
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Bookmarks</h1>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <h2>Welcome Back</h2>
        <p>Sign in to access your private AI-analyzed bookmarks.</p>
        <!-- Google Sign-In Button Container -->
        <div id="g_id_onload"
             data-client_id="65113458544-2j2i8gufqvcpkvitbsfae0aqr6142n7h.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="filled_black"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard">
        <div class="header-actions">
            <span class="user-greeting" id="userGreeting">Hello, User</span>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste a URL here (e.g., https://github.com)">
            <button class="primary-btn" onclick="saveBookmark()">Save Link</button>
        </div>

        <p id="loadingMsg">✨ AI is analyzing the page...</p>

        <input type="text" id="searchInput" placeholder="🔍 Search by title, url, or summary..." onkeyup="applyFilters()" style="margin-bottom: 20px; width: 100%; box-sizing: border-box;">
        
        <div class="filters" id="categoryFilters">
            <button class="filter-btn active" onclick="setCategoryFilter('All')">All</button>
            <button class="filter-btn" onclick="setCategoryFilter('DSA')">DSA</button>
            <button class="filter-btn" onclick="setCategoryFilter('Jobs')">Jobs</button>
            <button class="filter-btn" onclick="setCategoryFilter('Reading')">Reading</button>
            <button class="filter-btn" onclick="setCategoryFilter('General')">General</button>
        </div>

        <div id="bookmarksList">
            <!-- Bookmarks injected here -->
        </div>
    </div>
</div>

<script>
    let allBookmarks = [];
    let currentFilter = 'All';

    // --- AUTHENTICATION LOGIC ---
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    if (token) {
        showDashboard();
    }

    async function handleCredentialResponse(response) {
        // Send Google token to our backend to verify and get a JWT
        try {
            const res = await fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            });
            const data = await res.json();
            
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // ALSO save to cookie so the Chrome Extension can read it!
                // We use SameSite=None and Secure so the extension can read it cross-site
                document.cookie = `token=${data.token}; path=/; max-age=604800; Secure; SameSite=None`;
                
                showDashboard();
            } else {
                alert("Login failed!");
            }
        } catch(err) {
            console.error("Auth error", err);
        }
    }

    function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        const storedUser = JSON.parse(localStorage.getItem('user'));
        if(storedUser) {
            document.getElementById('userGreeting').innerText = `Welcome, ${storedUser.name}`;
        }
        
        loadBookmarks();
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        document.cookie = "token=; path=/; max-age=0; Secure; SameSite=None";
        window.location.reload();
    }

    // --- API HELPER WITH AUTH ---
    async function apiFetch(endpoint, options = {}) {
        const token = localStorage.getItem('token');
        if(!token) { logout(); return; }

        const headers = { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
        };
        options.headers = { ...headers, ...options.headers };
        
        const response = await fetch(endpoint, options);
        if(response.status === 401) {
            logout(); // Token expired
            throw new Error("Unauthorized");
        }
        return response;
    }

    // --- BOOKMARK LOGIC ---
    async function loadBookmarks() {
        try {
            const response = await apiFetch('/api/bookmarks');
            allBookmarks = await response.json();
            applyFilters();
        } catch(e) { console.log(e); }
    }

    function setCategoryFilter(category) {
        currentFilter = category;
        const btns = document.querySelectorAll('.filter-btn');
        btns.forEach(btn => {
            btn.classList.toggle('active', btn.innerText === category);
        });
        applyFilters();
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = allBookmarks.filter(bm => {
            const matchesCategory = currentFilter === 'All' || bm.category === currentFilter;
            const searchString = `${bm.title} ${bm.url} ${bm.summary}`.toLowerCase();
            const matchesSearch = searchString.includes(searchTerm);
            return matchesCategory && matchesSearch;
        });
        renderBookmarks(filtered);
    }

    function renderBookmarks(bookmarks) {
        const listDiv = document.getElementById('bookmarksList');
        listDiv.innerHTML = '';
        
        if (bookmarks.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:var(--text-secondary); margin-top: 40px;">No bookmarks yet. Save one above!</p>';
            return;
        }

        bookmarks.forEach(bm => {
            listDiv.innerHTML += `
                <div class="bookmark-card">
                    <div class="bookmark-content">
                        <span class="tag">${bm.category || 'General'}</span>
                        <a href="${bm.url}" target="_blank" class="bookmark-title">${bm.title}</a>
                        <p class="bookmark-url">${bm.url}</p>
                        <p class="ai-summary"><span>✨</span> ${bm.summary || 'No summary available.'}</p>
                    </div>
                    <div class="card-actions">
                        <button class="icon-btn" onclick="editBookmark('${bm.id}', '${bm.title.replace(/'/g, "\\'")}')">✏️</button>
                        <button class="icon-btn delete" onclick="deleteBookmark('${bm.id}')">🗑️</button>
                    </div>
                </div>
            `;
        });
    }

    async function saveBookmark() {
        const urlValue = document.getElementById('urlInput').value;
        if (!urlValue) return;

        document.getElementById('loadingMsg').style.display = 'block';
        
        await apiFetch('/api/bookmarks', {
            method: 'POST',
            body: JSON.stringify({ url: urlValue })
        });

        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('urlInput').value = '';
        loadBookmarks();
    }

    async function editBookmark(id, currentTitle) {
        const newTitle = prompt("Enter new title:", currentTitle);
        if (newTitle && newTitle !== currentTitle) {
            await apiFetch(`/api/bookmarks/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ title: newTitle })
            });
            loadBookmarks();
        }
    }

    async function deleteBookmark(id) {
        if(confirm("Are you sure you want to delete this bookmark?")) {
            await apiFetch(`/api/bookmarks/${id}`, { method: 'DELETE' });
            loadBookmarks();
        }
    }
</script>

</body>
</html>
