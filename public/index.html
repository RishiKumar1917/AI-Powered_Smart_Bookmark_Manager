<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bookmarks HQ</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b; /* Deep space dark */
            --surface-color: rgba(20, 20, 25, 0.6); /* Very dark semi-transparent */
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent: #ff7eb3;
            --accent-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --text-gradient: linear-gradient(to right, #f8a5c2, #a78bfa, #8b5cf6); /* Pink to purple to blue */
        }

        body {
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Subtle radial glow in the center-top */
            background-image: radial-gradient(circle at 50% -20%, rgba(124, 58, 237, 0.15) 0%, rgba(9, 9, 11, 1) 70%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        h1, h2, #userGreeting {
            font-weight: 800;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        h1 {
            text-align: center;
            font-size: 3.5rem;
            margin-bottom: 40px;
        }
        
        h2 { font-size: 2rem; }

        /* LOGIN SCREEN */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 50vh;
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            padding: 40px;
            text-align: center;
        }

        #loginScreen p { color: var(--text-secondary); margin-bottom: 30px; font-size: 1.1rem; }

        /* DASHBOARD */
        #dashboard { display: none; }
        
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        #userGreeting { margin-bottom: 0; font-size: 1.7rem; }
        
        .logout-btn {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); border-color: rgba(255,255,255,0.2); }

        /* INPUT AREA */
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 16px 24px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }
        input:focus { 
            border-color: rgba(255,126,179,0.5); 
            box-shadow: 0 0 20px rgba(255,126,179,0.15);
            background: rgba(0, 0, 0, 0.5);
        }

        /* SEARCH & FILTERS */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .filters::-webkit-scrollbar { height: 4px; }
        .filters::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .filter-btn {
            padding: 10px 24px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 500;
        }
        .filter-btn:hover { 
            border-color: rgba(255,255,255,0.3); 
            color: white;
        }
        .filter-btn.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.3);
        }

        /* BOOKMARK CARDS */
        .bookmark-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 24px;
            margin-bottom: 20px;
            border-radius: 20px;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
        }
        /* Subtle shine effect on hover */
        .bookmark-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.03), transparent);
            transform: skewX(-20deg);
            transition: all 0.7s;
        }
        .bookmark-card:hover::before {
            left: 150%;
        }

        .bookmark-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            border-color: rgba(255,255,255,0.1);
            background: rgba(255, 255, 255, 0.04);
        }

        .bookmark-content { flex: 1; min-width: 0; padding-right: 20px; }
        
        .tag {
            display: inline-block;
            background: rgba(255, 126, 179, 0.1);
            color: #ff7eb3;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 126, 179, 0.2);
        }
        
        .bookmark-title {
            display: block;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }
        .bookmark-title:hover { color: var(--accent); }

        .bookmark-url {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0 0 16px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.7;
        }

        .ai-summary {
            color: #e2e8f0;
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 12px 16px;
            border-radius: 12px;
            border-left: 2px solid rgba(255,126,179,0.5);
        }

        .card-actions { display: flex; flex-direction: column; gap: 10px; }
        .icon-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
        }
        .icon-btn:hover { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border-color: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        .icon-btn.delete:hover { 
            background: rgba(239, 68, 68, 0.15); 
            color: #fca5a5; 
            border-color: rgba(239, 68, 68, 0.3);
        }

        #loadingContainer { 
            display: none; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 20px; 
            gap: 15px; 
        }
        /* PROGRESS RING LOADER */
        .progress-ring-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }
        .progress-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: conic-gradient(var(--accent) 0%, rgba(255, 126, 179, 0.15) 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            position: relative;
            transition: background 0.3s ease;
        }
        .progress-ring::before {
            content: "";
            position: absolute;
            width: 58px;
            height: 58px;
            background-color: var(--bg-color); /* Inner circle to make it a ring */
            border-radius: 50%;
        }
        .progress-ring span {
            position: relative;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
        }
        .progress-text {
            color: var(--accent);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* 3D FLOATING SIDEBAR ILLUSTRATIONS */
        .illustration-flank {
            position: fixed;
            top: 55%;
            transform: translateY(-50%);
            width: 150px;
            height: 150px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.15; /* Sleek, comforting, low-contrast */
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #illustrationLeft {
            left: 3%;
        }
        #illustrationRight {
            right: 3%;
        }
        
        .illustration-flank svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        #illustrationLeft svg {
            animation: float3DLeft 9s ease-in-out infinite alternate;
        }
        #illustrationRight svg {
            animation: float3DRight 9s ease-in-out infinite alternate;
        }

        @keyframes float3DLeft {
            0% { transform: rotateY(15deg) rotateX(10deg) translateY(0px); }
            50% { transform: rotateY(25deg) rotateX(15deg) translateY(-15px); }
            100% { transform: rotateY(15deg) rotateX(10deg) translateY(0px); }
        }
        @keyframes float3DRight {
            0% { transform: rotateY(-15deg) rotateX(10deg) translateY(0px); }
            50% { transform: rotateY(-25deg) rotateX(15deg) translateY(-15px); }
            100% { transform: rotateY(-15deg) rotateX(10deg) translateY(0px); }
        }

        /* Inner animation keyframes for SVGs */
        .car-group {
            animation: accelerateCar 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            transform-origin: center;
        }
        @keyframes accelerateCar {
            0% { transform: translateX(-15px); }
            35% { transform: translateX(20px) scaleX(1.08); } /* Acceleration stretch */
            48% { transform: translateX(20px) scaleX(1.0); }
            100% { transform: translateX(-15px); }
        }

        .coin-group {
            animation: floatCoin 3s ease-in-out infinite alternate;
            transform-origin: center;
        }
        @keyframes floatCoin {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            100% { transform: translateY(-8px) scale(1.05) rotate(5deg); }
        }

        .book-group {
            animation: bounceBook 4s ease-in-out infinite alternate;
            transform-origin: center;
        }
        @keyframes bounceBook {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-6px) rotate(4deg); }
        }

        /* Additional category animations */
        .steam-line {
            animation: riseSteam 2s infinite linear;
            transform-origin: bottom center;
        }
        @keyframes riseSteam {
            0% { opacity: 0; transform: translateY(5px) scaleX(0.8); }
            50% { opacity: 0.8; transform: translateY(-5px) scaleX(1.2); }
            100% { opacity: 0; transform: translateY(-15px) scaleX(0.8); }
        }

        .music-note {
            animation: pulseMusic 3s ease-in-out infinite alternate;
            transform-origin: center;
        }
        @keyframes pulseMusic {
            0% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1.05) rotate(5deg); }
        }

        .gamepad {
            animation: driftGamepad 4s ease-in-out infinite alternate;
            transform-origin: center;
        }
        @keyframes driftGamepad {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-8px) rotate(8deg); }
        }

        .briefcase {
            animation: swingBriefcase 4s ease-in-out infinite alternate;
            transform-origin: top center;
        }
        @keyframes swingBriefcase {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }

        .heart-pulse {
            animation: heartBeat 1.2s ease-in-out infinite;
            transform-origin: center;
        }
        @keyframes heartBeat {
            0% { transform: scale(0.9); }
            30% { transform: scale(1.05); }
            45% { transform: scale(0.95); }
            60% { transform: scale(1.1); }
            100% { transform: scale(0.9); }
        }

        .design-palette {
            animation: rotatePalette 10s linear infinite;
            transform-origin: center;
        }
        @keyframes rotatePalette {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .newspaper {
            animation: flipNews 5s ease-in-out infinite alternate;
            transform-origin: center;
        }
        @keyframes flipNews {
            0% { transform: scale(0.95) rotate(-3deg); }
            100% { transform: scale(1.02) rotate(3deg); }
        }

        .clock-group {
            animation: floatClock 4s ease-in-out infinite alternate;
            transform-origin: center;
        }
        @keyframes floatClock {
            0% { transform: translateY(0); }
            100% { transform: translateY(-7px); }
        }

        .yt-icon {
            animation: pulseYt 2s ease-in-out infinite alternate;
            transform-origin: center;
        }
        @keyframes pulseYt {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); }
        }

        /* ONBOARDING SCREEN */
        #onboardingScreen { display: none; }
        .onboarding-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .onboarding-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 35px;
        }
        .interests-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .interest-chip {
            padding: 14px 10px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interest-chip:hover {
            border-color: rgba(255,255,255,0.3);
            color: white;
        }
        .interest-chip.selected {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.3);
        }
        .custom-interest-row {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .custom-interest-row input {
            flex: 1;
        }
        .custom-interest-row button {
            padding: 14px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 16px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }
        .custom-interest-row button:hover {
            background: rgba(255,255,255,0.1);
        }
        .get-started-btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.3);
            transition: all 0.3s;
        }
        .get-started-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 117, 140, 0.4);
        }
        .settings-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .settings-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            transform: rotate(45deg);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<!-- Subtle 3D Floating Side Illustrations -->
<div id="illustrationLeft" class="illustration-flank"></div>
<div id="illustrationRight" class="illustration-flank"></div>
<div class="container">
    <h1>Smart Bookmarks</h1>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <h2>Welcome Back</h2>
        <p>Sign in to access your private AI-analyzed bookmarks.</p>
        <!-- Google Sign-In Button Container -->
        <div id="g_id_onload"
             data-client_id="65113458544-2j2i8gufqvcpkvitbsfae0aqr6142n7h.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="filled_black"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
    </div>

    <!-- ONBOARDING SCREEN -->
    <div id="onboardingScreen">
        <h2 class="onboarding-title">Choose Your Interests</h2>
        <p class="onboarding-subtitle">Pick topics that matter to you. The AI will use these to organize your bookmarks.</p>
        <div class="interests-grid" id="interestsGrid"></div>
        <div class="custom-interest-row">
            <input type="text" id="customInterestInput" placeholder="Add a custom interest..." aria-label="Add a custom interest">
            <button onclick="addCustomInterest()">+ Add</button>
        </div>
        <button class="get-started-btn" onclick="saveInterests()">Get Started →</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard">
        <div class="header-actions">
            <span id="userGreeting">Hello, User</span>
            <div class="header-right">
                <button class="settings-btn" onclick="openSettings()" title="Edit Interests">⚙️</button>
                <button class="logout-btn" onclick="logout()">Sign Out</button>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste a URL here (e.g., github.com) - It will save automatically" aria-label="Bookmark URL" oninput="handleUrlInput(event)">
        </div>

        <div id="progressRingContainer" class="progress-ring-container">
            <div id="progressRing" class="progress-ring">
                <span id="progressPercent">0%</span>
            </div>
            <span class="progress-text">Almost there...</span>
        </div>

        <input type="text" id="searchInput" placeholder="🔍 Search by title, url, or summary..." onkeyup="applyFilters()" style="margin-bottom: 20px; width: 100%; box-sizing: border-box;" aria-label="Search bookmarks">
        
        <div class="filters" id="categoryFilters">
            <!-- Dynamic filters injected by JS -->
        </div>

        <div id="bookmarksList">
            <!-- Bookmarks injected here -->
        </div>
    </div>
</div>

<script>
    let allBookmarks = [];
    let currentFilter = 'All';

    // --- ILLUSTRATIONS FOR CATEGORIES ---
    const illustrationTemplates = {
        tech: `
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="20" width="80" height="60" rx="6" fill="#141419" stroke="url(#techGrad)" stroke-width="2" />
            <circle cx="20" cy="28" r="2" fill="#ff758c" />
            <circle cx="26" cy="28" r="2" fill="#ff7eb3" />
            <circle cx="32" cy="28" r="2" fill="#a78bfa" />
            <line x1="20" y1="42" x2="50" y2="42" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" stroke-dasharray="30" stroke-dashoffset="30">
              <animate attributeName="stroke-dashoffset" values="30;0;30" dur="4s" repeatCount="indefinite" />
            </line>
            <line x1="20" y1="52" x2="75" y2="52" stroke="#ff7eb3" stroke-width="3" stroke-linecap="round" stroke-dasharray="55" stroke-dashoffset="55">
              <animate attributeName="stroke-dashoffset" values="55;0;55" dur="5s" repeatCount="indefinite" />
            </line>
            <line x1="20" y1="62" x2="40" y2="62" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" stroke-dasharray="20" stroke-dashoffset="20">
              <animate attributeName="stroke-dashoffset" values="20;0;20" dur="3s" repeatCount="indefinite" />
            </line>
            <defs>
              <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff758c" />
                <stop offset="100%" stop-color="#a78bfa" />
              </linearGradient>
            </defs>
          </svg>
        `,
        travel: `
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <line x1="5" y1="75" x2="95" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="6,4">
               <animate attributeName="stroke-dashoffset" values="0;20" dur="1.5s" repeatCount="indefinite" />
            </line>
            <g class="car-group">
              <path d="M 22 65 L 28 48 L 58 48 L 68 65 L 76 65 A 4 4 0 0 1 80 69 L 16 69 A 4 4 0 0 1 20 65 Z" fill="url(#travelGrad)" />
              <rect x="33" y="52" width="10" height="7" fill="#09090b" rx="1" />
              <rect x="47" y="52" width="10" height="7" fill="#09090b" rx="1" />
              <circle cx="32" cy="69" r="6" fill="#09090b" stroke="#ff7eb3" stroke-width="1.5">
                 <animateTransform attributeName="transform" type="rotate" from="0 32 69" to="360 32 69" dur="0.8s" repeatCount="indefinite" />

    function updateIllustrations(filter) {
        const leftDiv = document.getElementById('illustrationLeft');
        const rightDiv = document.getElementById('illustrationRight');
        if (!leftDiv || !rightDiv) return;

        let leftTheme = 'tech';
        let rightTheme = 'reading';

        const normalized = filter.toLowerCase();

        if (normalized === 'all') {
            leftTheme = 'tech';
            rightTheme = 'travel';
        } else if (normalized.includes('dsa') || normalized.includes('dev') || normalized.includes('ai') || normalized.includes('science')) {
            leftTheme = 'tech';
            rightTheme = 'tech';
        } else if (normalized.includes('travel')) {
            leftTheme = 'travel';
            rightTheme = 'travel';
        } else if (normalized.includes('finance')) {
            leftTheme = 'finance';
            rightTheme = 'finance';
        } else if (normalized.includes('job')) {
            leftTheme = 'jobs';
            rightTheme = 'jobs';
        } else if (normalized.includes('cook')) {
            leftTheme = 'cooking';
            rightTheme = 'cooking';
        } else if (normalized.includes('music')) {
            leftTheme = 'music';
            rightTheme = 'music';
        } else if (normalized.includes('game') || normalized.includes('gaming')) {
            leftTheme = 'gaming';
            rightTheme = 'gaming';
        } else if (normalized.includes('fit') || normalized.includes('fitness')) {
            leftTheme = 'fitness';
            rightTheme = 'fitness';
        } else if (normalized.includes('design')) {
            leftTheme = 'design';
            rightTheme = 'design';
        } else if (normalized.includes('news')) {
            leftTheme = 'news';
            rightTheme = 'news';
        } else if (normalized.includes('prod') || normalized.includes('productivity')) {
            leftTheme = 'productivity';
            rightTheme = 'productivity';
        } else if (normalized.includes('youtube') || normalized.includes('video')) {
            leftTheme = 'youtube';
            rightTheme = 'youtube';
        } else {
            leftTheme = 'reading';
            rightTheme = 'reading';
        }

        leftDiv.innerHTML = illustrationTemplates[leftTheme] || '';
        rightDiv.innerHTML = illustrationTemplates[rightTheme] || '';
    }
    let userCategories = [];

    // --- Suggested interests for onboarding ---
    const suggestedInterests = [
        'DSA', 'Jobs', 'Reading', 'AI / ML', 'Web Dev',
        'Finance', 'Fitness', 'Cooking', 'Music',
        'Gaming', 'Travel', 'Design', 'Science',
        'News', 'Productivity'
    ];
    let selectedInterests = new Set();

    // --- AUTHENTICATION LOGIC ---
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    if (token) {
        initAfterLogin();
    }

    async function handleCredentialResponse(response) {
        try {
            const res = await fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            });
            const data = await res.json();
            
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                document.cookie = `token=${data.token}; path=/; max-age=604800; Secure; SameSite=None`;
                initAfterLogin();
            } else {
                alert("Login failed!");
            }
        } catch(err) {
            console.error("Auth error", err);
        }
    }

    async function initAfterLogin() {
        document.getElementById('loginScreen').style.display = 'none';

        // Check if user has categories set up
        try {
            const res = await apiFetch('/api/categories');
            const data = await res.json();
            userCategories = data.categories || [];
        } catch(e) {
            userCategories = [];
        }

        if (userCategories.length === 0) {
            // New user — show onboarding
            showOnboarding();
        } else {
            showDashboard();
        }
    }

    // --- ONBOARDING LOGIC ---
    function showOnboarding() {
        document.getElementById('onboardingScreen').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        renderInterestsGrid();
    }

    function renderInterestsGrid() {
        const grid = document.getElementById('interestsGrid');
        grid.innerHTML = '';
        const allOptions = [...new Set([...suggestedInterests, ...selectedInterests])];
        allOptions.forEach(interest => {
            const chip = document.createElement('div');
            chip.className = 'interest-chip' + (selectedInterests.has(interest) ? ' selected' : '');
            chip.innerText = interest;
            chip.onclick = () => toggleInterest(interest);
            grid.appendChild(chip);
        });
    }

    function toggleInterest(interest) {
        if (selectedInterests.has(interest)) {
            selectedInterests.delete(interest);
        } else {
            selectedInterests.add(interest);
        }
        renderInterestsGrid();
    }

    function addCustomInterest() {
        const input = document.getElementById('customInterestInput');
        const value = input.value.trim();
        if (value && !selectedInterests.has(value)) {
            selectedInterests.add(value);
            renderInterestsGrid();
            input.value = '';
        }
    }

    async function saveInterests() {
        if (selectedInterests.size === 0) {
            alert('Please select at least one interest!');
            return;
        }
        const categories = [...selectedInterests];
        // Always include 'General' as fallback
        if (!categories.includes('General')) categories.push('General');

        await apiFetch('/api/categories', {
            method: 'POST',
            body: JSON.stringify({ categories })
        });

        userCategories = categories;
        document.getElementById('onboardingScreen').style.display = 'none';
        showDashboard();
    }

    function openSettings() {
        // Pre-select current categories
        selectedInterests = new Set(userCategories.filter(c => c !== 'General'));
        document.getElementById('dashboard').style.display = 'none';
        showOnboarding();
    }

    // --- DASHBOARD LOGIC ---
    function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('onboardingScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        const storedUser = JSON.parse(localStorage.getItem('user'));
        if(storedUser) {
            document.getElementById('userGreeting').innerText = `Welcome, ${storedUser.name}`;
        }

        renderFilterButtons();
        loadBookmarks();
        updateIllustrations(currentFilter);
    }

    function renderFilterButtons() {
        const container = document.getElementById('categoryFilters');
        container.innerHTML = '';

        const allBtn = document.createElement('button');
        allBtn.className = 'filter-btn active';
        allBtn.innerText = 'All';
        allBtn.onclick = () => setCategoryFilter('All');
        container.appendChild(allBtn);

        userCategories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.innerText = cat;
            btn.onclick = () => setCategoryFilter(cat);
            container.appendChild(btn);
        });
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        document.cookie = "token=; path=/; max-age=0; Secure; SameSite=None";
        window.location.reload();
    }

    // --- API HELPER WITH AUTH ---
    async function apiFetch(endpoint, options = {}) {
        const token = localStorage.getItem('token');
        if(!token) { logout(); return; }

        const headers = { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
        };
        options.headers = { ...headers, ...options.headers };
        
        const response = await fetch(endpoint, options);
        if(response.status === 401) {
            logout();
            throw new Error("Unauthorized");
        }
        return response;
    }

    // --- BOOKMARK LOGIC ---
    async function loadBookmarks() {
        try {
            const response = await apiFetch('/api/bookmarks');
            const data = await response.json();
            // Sort to show the most recent bookmark at the top (descending id)
            allBookmarks = data.sort((a, b) => b.id - a.id);
            applyFilters();
        } catch(e) { console.log(e); }
    }

    function setCategoryFilter(category) {
        currentFilter = category;
        const btns = document.querySelectorAll('.filter-btn');
        btns.forEach(btn => {
            btn.classList.toggle('active', btn.innerText === category);
        });
        applyFilters();
        updateIllustrations(category);
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = allBookmarks.filter(bm => {
            const matchesCategory = currentFilter === 'All' || bm.category === currentFilter;
            const searchString = `${bm.title} ${bm.url} ${bm.summary}`.toLowerCase();
            const matchesSearch = searchString.includes(searchTerm);
            return matchesCategory && matchesSearch;
        });
        renderBookmarks(filtered);
    }

    function renderBookmarks(bookmarks) {
        const listDiv = document.getElementById('bookmarksList');
        listDiv.innerHTML = '';
        
        if (bookmarks.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:var(--text-secondary); margin-top: 40px;">No bookmarks yet. Save one above!</p>';
            return;
        }

        bookmarks.forEach(bm => {
            listDiv.innerHTML += `
                <div class="bookmark-card">
                    <div class="bookmark-content">
                        <span class="tag">${bm.category || 'General'}</span>
                        <a href="${bm.url}" target="_blank" class="bookmark-title">${bm.title}</a>
                        <p class="bookmark-url">${bm.url}</p>
                        <p class="ai-summary"><span>✨</span> ${bm.summary || 'No summary available.'}</p>
                    </div>
                    <div class="card-actions">
                        <button class="icon-btn" onclick="editBookmark('${bm.id}', '${bm.title.replace(/'/g, "\\'")}')">✏️</button>
                        <button class="icon-btn delete" onclick="deleteBookmark('${bm.id}')">🗑️</button>
                    </div>
                </div>
            `;
        });
    }

    function handleUrlInput(event) {
        let val = event.target.value.trim();
        if (!val) return;

        // Basic check if it looks like a domain or URL
        if (val.includes('.') && !val.includes(' ')) {
            // Check for missing http/https using if statements as requested
            if (!val.startsWith('http://') && !val.startsWith('https://')) {
                val = 'https://' + val;
            }
            // Auto trigger save, then clear input
            event.target.value = '';
            saveBookmark(val);
        }
    }

    async function saveBookmark(urlValue) {
        if (!urlValue) return;

        // Show the progress ring
        const ringContainer = document.getElementById('progressRingContainer');
        const ring = document.getElementById('progressRing');
        const percentText = document.getElementById('progressPercent');
        
        // Reset and show ring
        ringContainer.style.display = 'flex';
        ring.style.background = `conic-gradient(var(--accent) 0%, rgba(255, 126, 179, 0.15) 0%)`;
        percentText.innerText = '0%';
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 15) + 5; // jump by 5-20%
            if (progress > 95) progress = 95;
            ring.style.background = `conic-gradient(var(--accent) ${progress}%, rgba(255, 126, 179, 0.15) ${progress}%)`;
            percentText.innerText = progress + '%';
        }, 600);
        
        await apiFetch('/api/bookmarks', {
            method: 'POST',
            body: JSON.stringify({ url: urlValue })
        });

        // Complete animation
        clearInterval(interval);
        ring.style.background = `conic-gradient(var(--accent) 100%, rgba(255, 126, 179, 0.15) 100%)`;
        percentText.innerText = '100%';
        
        setTimeout(() => {
            ringContainer.style.display = 'none';
            loadBookmarks();
        }, 600);
    }

    async function editBookmark(id, currentTitle) {
        const newTitle = prompt("Enter new title:", currentTitle);
        if (newTitle && newTitle !== currentTitle) {
            await apiFetch(`/api/bookmarks/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ title: newTitle })
            });
            loadBookmarks();
        }
    }

    async function deleteBookmark(id) {
        if(confirm("Are you sure you want to delete this bookmark?")) {
            await apiFetch(`/api/bookmarks/${id}`, { method: 'DELETE' });
            loadBookmarks();
        }
    }
